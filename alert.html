<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CriNet — Scam Shield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #09090b;
      --surface:   #18181b;
      --border:    #27272a;
      --muted:     #71717a;
      --text:      #fafafa;
      --subtext:   #a1a1aa;
      --green:     #22c55e;
      --amber:     #f59e0b;
      --red:       #ef4444;
      --red-glow:  rgba(239, 68, 68, 0.35);
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Idle screen ───────────────────────────────────────────────────────── */
    #idle-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px;
      padding: 24px;
      transition: opacity 0.4s ease;
      z-index: 1;
    }

    .logo-ring {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #18181b, #27272a);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 8px rgba(255,255,255,0.02);
      animation: pulse-idle 3s ease-in-out infinite;
    }
    .logo-ring svg { width: 44px; height: 44px; }

    @keyframes pulse-idle {
      0%, 100% { box-shadow: 0 0 0 8px rgba(255,255,255,0.02); }
      50%       { box-shadow: 0 0 0 16px rgba(255,255,255,0.04); }
    }

    #idle-screen h1 {
      font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 40%, #71717a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-align: center;
    }
    #idle-screen p { color: var(--subtext); font-size: 0.875rem; text-align: center; max-width: 260px; }

    /* Status indicator */
    .status-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 0.8125rem; font-weight: 500;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.connected  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2s infinite; }
    .status-dot.listening  { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: blink 1s infinite; }
    .status-dot.error      { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── ALERT overlay ─────────────────────────────────────────────────────── */
    #alert-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; padding: 32px;
      background: rgba(9,9,11,0.0);
      pointer-events: none;
      transition: background 0.3s;
    }
    #alert-overlay.active {
      pointer-events: all;
      background: rgba(9,9,11,0.92);
    }

    /* flashing red border */
    #alert-overlay::before {
      content: '';
      position: fixed; inset: 0;
      border: 6px solid var(--red);
      border-radius: 0;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 99;
      pointer-events: none;
    }
    #alert-overlay.active::before { animation: border-flash 0.8s steps(1) infinite; }
    @keyframes border-flash { 0%,49%{opacity:1} 50%,100%{opacity:0} }

    /* Alert card */
    #alert-card {
      width: 100%; max-width: 360px;
      background: #1a0505;
      border: 1.5px solid var(--red);
      border-radius: 20px;
      padding: 28px 24px 24px;
      display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 0 60px var(--red-glow), 0 0 120px rgba(239,68,68,0.12);
      transform: scale(0.85); opacity: 0;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
    }
    #alert-overlay.active #alert-card {
      transform: scale(1); opacity: 1;
    }

    .alert-icon {
      width: 56px; height: 56px; border-radius: 14px;
      background: rgba(239,68,68,0.15);
      border: 1.5px solid rgba(239,68,68,0.3);
      display: flex; align-items: center; justify-content: center;
    }
    .alert-icon svg { width: 28px; height: 28px; color: var(--red); }

    #alert-card h2 {
      font-size: 1.375rem; font-weight: 800; color: var(--red);
      letter-spacing: -0.02em;
    }

    #alert-category {
      display: inline-flex; align-items: center;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em;
      border-radius: 6px; padding: 3px 10px;
    }

    #alert-confidence {
      color: var(--subtext); font-size: 0.8125rem;
    }
    #alert-confidence span { color: var(--text); font-weight: 600; }

    #alert-reason {
      font-size: 0.9375rem; color: #fca5a5; line-height: 1.55;
      border-top: 1px solid rgba(239,68,68,0.2); padding-top: 14px;
    }

    /* Dismiss button */
    #dismiss-btn {
      width: 100%; padding: 14px;
      border-radius: 12px;
      background: var(--red);
      color: white; font-size: 0.9375rem; font-weight: 700;
      border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 4px;
    }
    #dismiss-btn:active { transform: scale(0.97); opacity: 0.85; }

    /* History panel */
    #history {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      max-height: 200px; overflow-y: auto;
      z-index: 2;
      transition: transform 0.3s;
    }
    #history h3 { font-size: 0.75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .history-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }
    .history-item:last-child { border-bottom: none; }
    .h-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); margin-top: 3px; flex-shrink: 0; }
    .h-cat  { font-weight: 600; color: #fca5a5; }
    .h-time { color: var(--muted); font-size: 0.75rem; margin-left: auto; flex-shrink: 0; }
    #no-alerts { color: var(--muted); font-size: 0.8125rem; }
  </style>
</head>
<body>

<!-- ── Idle screen ─────────────────────────────────────────────────────────── -->
<div id="idle-screen">
  <div class="logo-ring">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 8C15.163 8 8 15.163 8 24s7.163 16 16 16 16-7.163 16-16S32.837 8 24 8z" fill="#ef4444" opacity="0.15"/>
      <path d="M24 14a10 10 0 1 0 0 20A10 10 0 0 0 24 14z" fill="#ef4444" opacity="0.3"/>
      <circle cx="24" cy="24" r="5" fill="#ef4444"/>
      <path d="M24 6v4M24 38v4M6 24h4M38 24h4" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    </svg>
  </div>

  <div style="text-align:center">
    <h1>CriNet Shield</h1>
    <p style="margin-top:6px">Real-time scam detection is active. You'll be alerted the moment a threat is detected.</p>
  </div>

  <div class="status-pill">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>

  <p style="color:var(--muted);font-size:0.75rem;text-align:center;max-width:240px">
    Keep this page open during the call.
  </p>
</div>

<!-- ── Alert overlay ───────────────────────────────────────────────────────── -->
<div id="alert-overlay">
  <div id="alert-card">
    <div class="alert-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>

    <div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <h2>⚠️ SCAM DETECTED</h2>
      </div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span id="alert-category">—</span>
        <span id="alert-confidence" class="alert-confidence">Confidence: <span id="conf-value">—</span></span>
      </div>
    </div>

    <p id="alert-reason">Analyzing…</p>

    <button id="dismiss-btn" onclick="dismissAlert()">Dismiss</button>
  </div>
</div>

<!-- ── Alert history ───────────────────────────────────────────────────────── -->
<div id="history">
  <h3>Alert History</h3>
  <div id="history-list"><p id="no-alerts">No alerts yet — monitoring…</p></div>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────────
  // The backend host — same host this page is served from, or manually set
  const WS_HOST = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
    ? `ws://${location.host}`
    : `wss://${location.host}`;

  const ALERTS_WS_URL = `${WS_HOST}/alerts`;

  // ── State ──────────────────────────────────────────────────────────────────
  let ws = null;
  let reconnectTimer = null;
  let alertHistory = [];

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const overlay     = document.getElementById('alert-overlay');
  const dot         = document.getElementById('status-dot');
  const statusText  = document.getElementById('status-text');
  const historyList = document.getElementById('history-list');
  const noAlerts    = document.getElementById('no-alerts');

  // ── WebSocket ──────────────────────────────────────────────────────────────
  function connect() {
    if (ws) { ws.close(); ws = null; }
    setStatus('connecting');

    ws = new WebSocket(ALERTS_WS_URL);

    ws.addEventListener('open', () => {
      setStatus('connected');
      clearTimeout(reconnectTimer);
    });

    ws.addEventListener('message', (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'scam_alert') showAlert(msg);
    });

    ws.addEventListener('close', () => {
      setStatus('error');
      reconnectTimer = setTimeout(connect, 3000);
    });

    ws.addEventListener('error', () => {
      setStatus('error');
    });
  }

  // ── Status helper ──────────────────────────────────────────────────────────
  function setStatus(state) {
    dot.className = 'status-dot ' + state;
    const labels = {
      connecting: 'Connecting…',
      connected:  'Monitoring — Listening',
      error:      'Reconnecting…',
    };
    statusText.textContent = labels[state] || state;
    if (state === 'connected') dot.classList.add('listening');
  }

  // ── Show alert ─────────────────────────────────────────────────────────────
  function showAlert(data) {
    const categoryLabel = (data.category || 'other').replace(/_/g, ' ').toUpperCase();
    const confidence    = Math.round((data.confidence || 1) * 100);
    const reason        = data.reason || 'Scam pattern detected in the conversation.';

    document.getElementById('alert-category').textContent   = categoryLabel;
    document.getElementById('conf-value').textContent       = `${confidence}%`;
    document.getElementById('alert-reason').textContent     = reason;

    overlay.classList.add('active');

    // Vibration — works in Chrome on Android
    if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 500]);

    // Record in history
    alertHistory.unshift({ category: categoryLabel, reason, confidence, ts: new Date() });
    renderHistory();
  }

  function dismissAlert() {
    overlay.classList.remove('active');
    if (navigator.vibrate) navigator.vibrate(50);
  }

  // ── History render ─────────────────────────────────────────────────────────
  function renderHistory() {
    if (alertHistory.length === 0) {
      historyList.innerHTML = '<p id="no-alerts">No alerts yet — monitoring…</p>';
      return;
    }
    historyList.innerHTML = alertHistory.map(a => `
      <div class="history-item">
        <div class="h-dot"></div>
        <div>
          <div class="h-cat">${a.category}</div>
          <div style="color:var(--subtext);margin-top:2px">${a.reason.substring(0,80)}${a.reason.length>80?'…':''}</div>
        </div>
        <div class="h-time">${formatTime(a.ts)}</div>
      </div>
    `).join('');
  }

  function formatTime(d) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  // ── Keyboard dismiss ───────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') dismissAlert();
  });

  // ── Boot ───────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
